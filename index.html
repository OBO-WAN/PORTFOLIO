<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vorname Nachname | Portfolio</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mobile.css" />
  </head>
  <body>
    <div class="ui-left">
      <img src="assets/img/Menu system.png" alt="Navigation links" />

      <!-- unsichtbare Click-Zonen -->
      <a class="hit hit--why" href="#about" aria-label="Why me"></a>
      <a class="hit hit--skills" href="#skills" aria-label="Skills"></a>
      <a class="hit hit--work" href="#projects" aria-label="My Work"></a>
      <a class="hit hit--contact" href="#contact" aria-label="Contact"></a>
    </div>

    <div class="ui-top">
      <img src="assets/img/Social media.png" alt="Socialmedia icons" />
    </div>

    <main>
      <section class="hero" id="top">
        <div class="container hero__inner">
          <p class="hero__eyebrow">UI/UX Designer • Frontend</p>

          <h1 class="hero__title">
            Hi, ich bin <span class="hero__accent">Dein Name</span>.
          </h1>

          <p class="hero__text">
            Kurzbeschreibung (2–3 Zeilen) passend zu deinem Figma-Text.
          </p>

          <div class="hero__cta">
            <a class="btn btn--primary" href="#projects">Projekte</a>
            <a class="btn btn--ghost" href="#contact">Kontakt</a>
          </div>

          <div class="hero__media">
            <img
              class="hero__img"
              src="assets/img/hero.jpg"
              alt="Portrait von Dein Name"
            />
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2026 Vorname Nachname</p>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
