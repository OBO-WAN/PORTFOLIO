<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Francisco Naranjo | Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quantico:wght@700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/mobile.css" />

    <script src="js/main.js" defer></script>
  </head>

  <body>
    <!-- Sticky Sidebar -->
    <aside class="sidebar" aria-label="Primary">
      <div class="sidebar__badgeText">
        <svg class="sidebar__badgeArc" viewBox="0 0 64 64" aria-hidden="true">
          <!-- arc path (top curve) -->
          <path
            id="badgeArcPath"
            d="M 10 36 A 22 22 0 0 1 54 36"
            fill="none"
          ></path>
          <text class="sidebar__badgeArcText">
            <textPath
              href="#badgeArcPath"
              startOffset="50%"
              text-anchor="middle"
            >
              frontend developer
            </textPath>
          </text>
        </svg>

        <span class="sidebar__badgeInitials">FN</span>
      </div>

      <nav class="sidebar__nav" aria-label="Sections">
        <a class="sidebar__link" href="#contact">Contact</a>
        <a class="sidebar__link" href="#my-work">My Work</a>
        <a class="sidebar__link" href="#skills">Skills</a>
        <a class="sidebar__link" href="#why-me">Why me</a>
      </nav>
    </aside>

    <nav class="topbar">
      <div class="social" aria-label="Social media">
        <a
          class="social__btn icon icon--mail"
          href="mailto:francisco@naranjo.me"
          aria-label="Email"
        ></a>
        <a
          class="social__btn icon icon--linkedin"
          href="https://linkedin.com"
          target="_blank"
          aria-label="LinkedIn"
        ></a>
        <a
          class="social__btn icon icon--github"
          href="https://github.com/OBO-WAN"
          target="_blank"
          aria-label="GitHub"
        ></a>
      </div>

      <div class="lang" aria-label="Language switcher">
        <a
          class="icon icon--de"
          href="/de/"
          hreflang="de"
          lang="de"
          aria-current="page"
          aria-label="Deutsch"
        ></a>

        <span class="lang__divider icon icon--vline" aria-hidden="true"></span>

        <a
          class="icon icon--en"
          href="/en/"
          hreflang="en"
          lang="en"
          aria-label="English"
        ></a>
      </div>
    </nav>

    <main>
      <section id="home" class="hero">
        <div class="hero__portrait">
          <img src="assets/img/portrait.svg" alt="Francisco Naranjo portrait" />
        </div>

        <h1 class="hero__name" aria-label="Francisco Naranjo">
          <span class="hero__nameFirst">Francisco</span>
          <span class="hero__nameLast">Naranjo</span>
        </h1>

<h2 class="hero__subtitle">
  <span>Frontend</span>
  <span>Developer</span>
</h2>
        <a href="#why-me" class="hero__arrow" aria-label="Go to next section">
          <img src="assets/icons/arrow-right.svg" alt="" aria-hidden="true" />
        </a>
      </section>
    </main>
  </body>
</html>
